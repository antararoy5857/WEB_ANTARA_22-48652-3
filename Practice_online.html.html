<!DOCTYPE html>
<html lang="en">
<head>
    
 
    <title>Registration Form</title>
    <style>
        body {
         
            margin: 0;
            padding: 20px;
            background-color: lightgray;
            color: black;
        }

        h2 {
            text-align: center;
            color: blue;
            margin-bottom: 25px;
        }

        .form-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
            justify-content: center;
        }

        fieldset {
            flex: 1;
            min-width: 320px;
            max-width: 380px;
            border: 1px solid gray;
            border-radius: 8px;
            padding: 20px;
            background-color: white;
            
            box-sizing: border-box;
        }

        legend {
            font-weight: bold;
            padding: 0 10px;
            color: blue;
            font-size: 1.1em;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
            position: relative;
        }

        .label-container {
            font-weight: 600;
            color: black;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        input[type="text"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid gray;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95em;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: blue;
        }

        input[type="file"] {
            margin-top: 5px;
            font-size: 0.85em;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            padding: 5px 0;
        }

        .radio-group label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .address-box {
            border: 1px solid lightgray;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
            background-color: whitesmoke;
        }

        .address-box .select-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .address-box textarea {
            height: 70px;
            margin-bottom: 10px;
            resize: vertical;
        }

        .button-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        button[type="submit"] {
            padding: 10px 30px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
          
           
        }

        button[type="submit"]:hover {
            background-color: darkblue;
        }

        button[type="submit"]:active {
           
        }

        
        .error-message {
            color: red;
            font-size: 0.8em;
            margin-top: 4px;
            font-weight: 500;
            display: none;
        }

       
        .input-error {
            border-color: red !important;
            background-color: mistyrose;
        }
    </style>
</head>
<body>

    <h2>User Registration</h2>
    
    <form id="registrationForm" novalidate>
        <div class="form-container">
            
           
            <fieldset>
                <legend>General Information</legend>
                
                <div class="form-group">
                    <label class="label-container" for="fname">First Name:</label>
                    <input id="fname" type="text">
                    <div class="error-message" id="fname-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="lname">Last Name:</label>
                    <input id="lname" type="text">
                    <div class="error-message" id="lname-error"></div>
                </div>

                <div class="form-group">
                    <span class="label-container">Gender:</span>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male"> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                    </div>
                    <div class="error-message" id="gender-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="father">Father's Name:</label>
                    <input id="father" type="text">
                    <div class="error-message" id="father-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="photo">Upload Photo:</label>
                    <input id="photo" type="file">
                    <div class="error-message" id="photo-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="mother">Mother's Name:</label>
                    <input id="mother" type="text">
                    <div class="error-message" id="mother-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="blood">Blood Group:</label>
                    <select id="blood">
                        <option value="">Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                    <div class="error-message" id="blood-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="religion">Religion:</label>
                    <select id="religion">
                        <option value="">Select</option>
                        <option value="Islam">Islam</option>
                        <option value="Hinduism">Hinduism</option>
                        <option value="Christianity">Christianity</option>
                        <option value="Buddhism">Buddhism</option>
                    </select>
                    <div class="error-message" id="religion-error"></div>
                </div>
            </fieldset>

           
            <fieldset>
                <legend>Contact</legend>
                
                <div class="form-group">
                    <label class="label-container" for="email">Email:</label>
                    <input id="email" type="text">
                    <div class="error-message" id="email-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="phone">Phone:</label>
                    <input id="phone" type="text">
                    <div class="error-message" id="phone-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="website">Website:</label>
                    <input id="website" type="text">
                    <div class="error-message" id="website-error"></div>
                </div>
                
                <div class="address-box">
                    <span class="label-container" style="display:block; margin-bottom: 8px;">Present Address:</span>
                    <div class="select-row">
                        <div style="flex:1;">
                            <select id="country">
                                <option value="">Country</option>
                                <option value="Bangladesh">Bangladesh</option>
                                <option value="USA">USA</option>
                                <option value="UK">UK</option>
                            </select>
                            <div class="error-message" id="country-error"></div>
                        </div>
                        <div style="flex:1;">
                            <select id="district">
                                <option value="">District</option>
                                <option value="Dhaka">Dhaka</option>
                                <option value="Chittagong">Chittagong</option>
                                <option value="Rajshahi">Rajshahi</option>
                            </select>
                            <div class="error-message" id="district-error"></div>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 10px;">
                        <textarea id="address" placeholder="Road/Street/City details..."></textarea>
                        <div class="error-message" id="address-error"></div>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <input id="postcode" type="text" placeholder="Post Code">
                        <div class="error-message" id="postcode-error"></div>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Account Settings</legend>
                
                <div class="form-group">
                    <label class="label-container" for="username">Username:</label>
                    <input id="username" type="text">
                    <div class="error-message" id="username-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="password">Password:</label>
                    <input id="password" type="password">
                    <div class="error-message" id="password-error"></div>
                </div>

                <div class="form-group">
                    <label class="label-container" for="confirm">Confirm Password:</label>
                    <input id="confirm" type="password">
                    <div class="error-message" id="confirm-error"></div>
                </div>

                <div class="button-container">
                    <button type="submit">Register Now</button>
                </div>
            </fieldset>
            
        </div>
    </form>

    <script>
        document.getElementById("registrationForm").addEventListener("submit", function(event) {
            let isValid = true;

           
            const errorMessages = document.querySelectorAll('.error-message');
            errorMessages.forEach(msg => msg.style.display = 'none');
            
            const errorInputs = document.querySelectorAll('.input-error');
            errorInputs.forEach(input => input.classList.remove('input-error'));

            
            function setError(id, message) {
                const errorDiv = document.getElementById(id + "-error");
                const inputField = document.getElementById(id);
                
                if (errorDiv) {
                    errorDiv.innerText = message;
                    errorDiv.style.display = "block";
                }
                if (inputField) {
                    inputField.classList.add("input-error");
                }
                isValid = false;
            }

           
            const firstName = document.getElementById("fname").value.trim();
            const lastName = document.getElementById("lname").value.trim();
            const fatherName = document.getElementById("father").value.trim();
            const motherName = document.getElementById("mother").value.trim();
            const fileUpload = document.getElementById("photo").value;
            const bloodGroup = document.getElementById("blood").value;
            const religion = document.getElementById("religion").value;
            
            const emailValue = document.getElementById("email").value.trim();
            const phoneValue = document.getElementById("phone").value.trim();
            const websiteValue = document.getElementById("website").value.trim();
            
            const countryValue = document.getElementById("country").value;
            const districtValue = document.getElementById("district").value;
            const streetAddress = document.getElementById("address").value.trim();
            const postalCode = document.getElementById("postcode").value.trim();
            
            const usernameValue = document.getElementById("username").value.trim();
            const targetPassword = document.getElementById("password").value;
            const confirmedPassword = document.getElementById("confirm").value;

            
            if (firstName === "") setError("fname", "First Name is required.");
            if (lastName === "") setError("lname", "Last Name is required.");
            
            
            const genderElements = document.getElementsByName("gender");
            let isGenderSelected = false;
            for (let i = 0; i < genderElements.length; i++) {
                if (genderElements[i].checked) {
                    isGenderSelected = true;
                    break;
                }
            }
            if (!isGenderSelected) {
                setError("gender", "Please select your gender.");
            }

            if (fatherName === "") setError("father", "Father's Name is required.");
            if (fileUpload === "") setError("photo", "Please upload your photo.");
            if (motherName === "") setError("mother", "Mother's Name is required.");
            if (bloodGroup === "") setError("blood", "Please select your Blood Group.");
            if (religion === "") setError("religion", "Please select your Religion.");

            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,3}$/;
            if (!emailRegex.test(emailValue)) setError("email", "Please enter a valid email address.");

            const phoneRegex = /^[0-9]{11}$/;
            if (!phoneRegex.test(phoneValue)) setError("phone", "Phone number must be exactly 11 digits.");

            const websiteRegex = /^(https?:\/\/)?([\w-]+)\.([a-z]{2,6})(\/.*)?$/;
            if (!websiteRegex.test(websiteValue)) setError("website", "Please enter a valid website URL.");

            
            if (countryValue === "") setError("country", "Required.");
            if (districtValue === "") setError("district", "Required.");
            if (streetAddress === "") setError("address", "Street address cannot be empty.");
            
            const postRegex = /^[0-9]{4}$/;
            if (!postRegex.test(postalCode)) setError("postcode", "Post Code must be exactly 4 digits.");

            
            if (usernameValue.length < 5) setError("username", "Minimum 5 characters required.");

            
            if (targetPassword.length < 8) {
                setError("password", "Password must be at least 8 characters.");
            } else if (!targetPassword.match(/[A-Z]/)) {
                setError("password", "Must include at least one uppercase letter.");
            } else if (!targetPassword.match(/[a-z]/)) {
                setError("password", "Must include at least one lowercase letter.");
            } else if (!targetPassword.match(/[0-9]/)) {
                setError("password", "Must include at least one number.");
            } else if (!targetPassword.match(/[!@#$%^&*(),.?":{}|<>]/)) {
                setError("password", "Must include at least one special character.");
            }
            
            
            if (confirmedPassword === "") {
                setError("confirm", "Please confirm your password.");
            } else if (targetPassword !== confirmedPassword) {
                setError("confirm", "Passwords do not match.");
            }

            
            if (!isValid) {
                event.preventDefault();
            } else {
                alert("Validation successful. Registration finalized!");
            }
        });
    </script>
</body>
</html>
